{% extends 'core/base.html' %}
{% block title %}Delete {{ project.name }}{% endblock %}
{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">Delete project?</h1>
        <p class="page-subtitle">This will permanently delete <strong>{{ project.name }}</strong> and all of its tasks. This cannot be undone.</p>
    </div>
</div>
<form method="post" style="max-width: 640px;">
    {% csrf_token %}
    <div style="display: flex; gap: 0.75rem;">
        <button type="submit" class="btn btn-danger">Yes, delete</button>
        <a href="{% url 'project_detail' project.pk %}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
